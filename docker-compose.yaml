networks:
  mediastack:
    name: mediastack
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${DOCKER_SUBNET:?err}
          gateway: ${DOCKER_GATEWAY:?err}
  dockflare-internal:
    name: dockflare-internal

secrets:
  plex_claim:
    file: ./secret.d/plex_claim
  vpn_password:
    file: ./secret.d/vpn_password
  vpn_username:
    file: ./secret.d/vpn_username
  mail_password:
    file: ./secret.d/mail_password

services:
  traefik:
    image: "traefik:v3.6.9"
    container_name: "traefik"
    restart: unless-stopped
    command:
      #- "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--ping=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - default
      - mediastack
    labels:
      - "traefik.http.routers.traefik.rule=Host(`traefik.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      - "traefik.http.routers.traefik.entrypoints=web"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  traefik-avahi-helper:
    container_name: "traefik-avahi-helper"
    image: hardillb/traefik-avahi-helper
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - default
      - mediastack
    healthcheck:
      test: |
          pgrep -f "node index.js" >/dev/null 2>&1 && \
          pgrep -f "python cname.py" >/dev/null 2>&1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8888:8888/tcp" # Gluetun Local Network HTTP proxy
      - "8388:8388/tcp" # Gluetun Local Network Shadowsocks
      - "8388:8388/udp" # Gluetun Local Network Shadowsocks
      - "${WEBUI_PORT_QBITTORRENT:?err}:${WEBUI_PORT_QBITTORRENT:?err}" # WebUI Portal: qBittorrent
      - "${QBIT_PORT:?err}:6881" # Transmission Torrent Port
    volumes:
      - ${FOLDER_FOR_DATA:?err}/gluetun:/gluetun
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:?err}
      - OPENVPN_USER_FILE=/run/secrets/vpn_username
      - OPENVPN_PASSWORD_FILE=/run/secrets/vpn_password
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - SERVER_REGIONS=${SERVER_REGIONS}
      - SERVER_CITIES=${SERVER_CITIES}
      - SERVER_HOSTNAMES=${SERVER_HOSTNAMES}
      - SERVER_CATEGORIES=${SERVER_CATEGORIES}
      - FIREWALL_OUTBOUND_SUBNETS=${LOCAL_SUBNET:?err}
      - OPENVPN_CUSTOM_CONFIG=${OPENVPN_CUSTOM_CONFIG}
      - PORT_FORWARD_ONLY=${VPN_PORT_FORWARD_ONLY:?err}
      - HTTP_CONTROL_SERVER_ADDRESS=:${GLUETUN_CONTROL_PORT:?err}
      - VPN_TYPE=${VPN_TYPE}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - HTTPPROXY=on
      - SHADOWSOCKS=on
    secrets:
      - vpn_username
      - vpn_password
    networks:
      - mediastack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=${WEBUI_PORT_QBITTORRENT:?err}"
      - "traefik.http.routers.qbittorrent.entrypoints=web"
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  qbittorrent:
    image: linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/qbittorrent:/config
      - ${FOLDER_FOR_MEDIA:?err}:/data
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
      - WEBUI_PORT=${WEBUI_PORT_QBITTORRENT:?err}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:qbittorrent
      - TP_THEME=${TP_THEME:?err}
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:8200/api/v2/app/version || exit 1"]
      timeout: 10s
      retries: 3
      start_period: 60s

  tinymediamanager:
    profiles:
      - management
    image: tinymediamanager/tinymediamanager:5.2.7.1
    container_name: tinymediamanager
    environment:
      - USER_ID=${PUID:?err}
      - GROUP_ID=${PGID:?err}
      - ALLOW_DIRECT_VNC=true
      - LC_ALL=en_US.UTF-8
      - LANG=en_US.UTF-8
      - PASSWORD=tiny
    volumes:
      - ${FOLDER_FOR_DATA:?err}/tinymediamanager:/data
      - ${FOLDER_FOR_MEDIA:?err}:/media
    ports:
      - 5900:5900 # VNC port
      - 4000:4000 # Webinterface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  picard:
    profiles:
      - management
    container_name: picard
    image: mikenye/picard:2.13.3
    ports:
      - "5800:5800"
    volumes:
      - ${FOLDER_FOR_DATA:?err}/picard:/config
      - ${FOLDER_FOR_MEDIA:?err}:/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5800"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  radarr:
    image: linuxserver/radarr:6.0.4
    container_name: radarr
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/radarr:/config
      - ${FOLDER_FOR_MEDIA:?err}:/data
    ports:
      - "${WEBUI_PORT_RADARR:?err}:7878"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - TZ=${TIMEZONE:?err}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:radarr
      - TP_THEME=${TP_THEME:?err}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=${WEBUI_PORT_RADARR:?err}"
      - "traefik.http.routers.radarr.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sonarr:
    image: linuxserver/sonarr:4.0.16
    container_name: sonarr
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/sonarr:/config
      - ${FOLDER_FOR_MEDIA:?err}:/data
    ports:
      - "${WEBUI_PORT_SONARR:?err}:8989"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - TZ=${TIMEZONE:?err}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:sonarr
      - TP_THEME=${TP_THEME:?err}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.sonarr.loadbalancer.server.port=${WEBUI_PORT_SONARR:?err}"
      - "traefik.http.routers.sonarr.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  lidarr:
    image: linuxserver/lidarr:3.1.0
    container_name: lidarr
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_MEDIA:?err}:/data
      - ${FOLDER_FOR_DATA:?err}/lidarr:/config
    ports:
      - "${WEBUI_PORT_LIDARR:?err}:8686"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - TZ=${TIMEZONE:?err}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:lidarr
      - TP_THEME=${TP_THEME:?err}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
      - "traefik.http.routers.lidarr.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bazarr:
    image: linuxserver/bazarr:1.5.6
    container_name: bazarr
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/bazarr:/config
      - ${FOLDER_FOR_MEDIA:?err}:/data
    ports:
      - "${WEBUI_PORT_BAZARR:?err}:6767"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - TZ=${TIMEZONE:?err}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:bazarr
      - TP_THEME=${TP_THEME:?err}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.bazarr.loadbalancer.server.port=${WEBUI_PORT_BAZARR:?err}"
      - "traefik.http.routers.bazarr.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  plex:
    image: linuxserver/plex:1.43.0
    container_name: plex
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/plex:/config
      - ${FOLDER_FOR_MEDIA:?err}/media:/data/media
    ports:
      - "${WEBUI_PORT_PLEX:?err}:32400"
      - 8324:8324
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
      - 32469:32469
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
      - VERSION=docker
      - PLEX_CLAIM_FILE=/run/secrets/plex_claim
    secrets:
      - plex_claim
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plex.rule=Host(`plex.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.plex.loadbalancer.server.port=${WEBUI_PORT_PLEX:?err}"
      - "traefik.http.routers.plex.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  byparr:
    image: ghcr.io/thephaseless/byparr:2.1.0
    container_name: byparr
    restart: unless-stopped
    ports:
      - "${BYPARR_PORT:?err}:8191"
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TIMEZONE:?err}
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "${FLARESOLVERR_PORT:?err}:8191"
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TIMEZONE:?err}
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prowlarr:
    image: linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/prowlarr:/config
    ports:
      - "${WEBUI_PORT_PROWLARR:?err}:9696"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - TZ=${TIMEZONE:?err}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:prowlarr
      - TP_THEME=${TP_THEME:?err}
    depends_on:
      flaresolverr:
        condition: service_healthy
      byparr:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=${WEBUI_PORT_PROWLARR:?err}"
      - "traefik.http.routers.prowlarr.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  homarr:
    image: ghcr.io/homarr-labs/homarr:v1.53.2
    container_name: homarr
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT_HOMARR:?err}:7575"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${FOLDER_FOR_DATA:?err}/homarr/configs:/app/data/configs
      - ${FOLDER_FOR_DATA:?err}/homarr/icons:/app/public/icons
      - ${FOLDER_FOR_DATA:?err}/homarr/appdata:/appdata
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
      - SECRET_ENCRYPTION_KEY=${ENCRYPTION_KEY:?err}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`homarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"
      - "traefik.http.routers.homarr.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7575 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  jellyfin:
    image: linuxserver/jellyfin:10.11.6
    container_name: jellyfin
    restart: unless-stopped
    # Add Configurations for GPU Hardware Rendering Here:
    #    devices:
    #      - /dev/dri/renderD128:/dev/dri/renderD128
    #      - /dev/dri/card0:/dev/dri/card0
    volumes:
      - ${FOLDER_FOR_DATA:?err}/jellyfin:/config
      - ${FOLDER_FOR_MEDIA:?err}/media:/data/media
    ports:
      - "${WEBUI_PORT_JELLYFIN:?err}:8096"
      #      - 7359:7359/udp      # Enable for DLNA - Only works on HOST Network Mode
      #      - 1900:1900/udp      # Enable for DLNA - Only works on HOST Network Mode
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
    networks:
      - mediastack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.http.routers.jellyfin.entrypoints=web"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  seerr:
    image: seerr/seerr:v3.0.1
    container_name: seerr
    init: true
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/jellyseerr:/app/config
    ports:
      - "${WEBUI_PORT_JELLYSEERR:?err}:5055"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
    networks:
      - mediastack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`seerr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
      - "traefik.http.routers.seerr.entrypoints=web"
      - "cloudflare.tunnel.enable=true"
      - "cloudflare.tunnel.hostname=requests.${CF_EXTERNAL_HOSTNAME:?err}"
      - "cloudflare.tunnel.service=http://seerr:5055"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  wizarr:
    container_name: wizarr
    image: ghcr.io/wizarrrr/wizarr:v2026.2.1
    restart: unless-stopped
    ports:
      - ${WEBUI_PORT_WIZARR}:5690
    volumes:
      - ${FOLDER_FOR_DATA:?err}/wizarr/database:/data/database
    networks:
      - mediastack
    environment:
      - TZ=Europe/Paris
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wizarr.rule=Host(`wizarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.wizarr.loadbalancer.server.port=5690"
      - "traefik.http.routers.wizarr.entrypoints=web"
      - "cloudflare.tunnel.enable=true"
      - "cloudflare.tunnel.hostname=invite.${CF_EXTERNAL_HOSTNAME:?err}"
      - "cloudflare.tunnel.service=http://wizarr:5690"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5690"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:2.58.02
    container_name: tdarr
    restart: unless-stopped
    profiles:
      - tdarr
    volumes:
      - ${FOLDER_FOR_DATA:?err}/tdarr/server:/app/server
      - ${FOLDER_FOR_DATA:?err}/tdarr/configs:/app/configs
      - ${FOLDER_FOR_DATA:?err}/tdarr/logs:/app/logs
      - ${FOLDER_FOR_DATA:?err}/tdarr_transcode_cache:/temp
      - ${FOLDER_FOR_MEDIA:?err}/media:/data
    ports:
      - "${TDARR_SERVER_PORT:?err}:${TDARR_SERVER_PORT:?err}"
      - "${WEBUI_PORT_TDARR:?err}:${WEBUI_PORT_TDARR:?err}"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
      - serverIP=0.0.0.0
      - serverPort=${TDARR_SERVER_PORT:?err}
      - webUIPort=${WEBUI_PORT_TDARR:?err}
      - internalNode=true
      - nodeID=Tdarr_Server
    networks:
      - mediastack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tdarr.rule=Host(`tdarr.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.tdarr.loadbalancer.server.port=${WEBUI_PORT_TDARR:?err}"
      - "traefik.http.routers.tdarr.entrypoints=web"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEBUI_PORT_TDARR}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:2.58.02
    container_name: tdarr-node
    profiles:
      - tdarr
    restart: unless-stopped
    volumes:
      - ${FOLDER_FOR_DATA:?err}/tdarr/configs:/app/configs
      - ${FOLDER_FOR_DATA:?err}/tdarr/logs:/app/logs
      - ${FOLDER_FOR_DATA:?err}/tdarr_transcode_cache:/temp
      - ${FOLDER_FOR_MEDIA:?err}/media:/data
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
      - nodeID=Tdarr_Node_1
      - serverIP=tdarr
      - serverPort=${TDARR_SERVER_PORT:?err}
    networks:
      - mediastack
    depends_on:
      tdarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  plexio:
    image: ghcr.io/vanchaxy/plexio:0.1.15
    restart: unless-stopped
    container_name: plexio
    ports:
      - "${WEBUI_PORT_PLEXIO:?err}:80"
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - TZ=${TIMEZONE:?err}
      - PLEX_MATCHING_TOKEN=${PLEX_MATCHING_TOKEN:?err}
    networks:
      - mediastack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plexio.rule=Host(`plexio.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.plexio.loadbalancer.server.port=80"
      - "traefik.http.routers.plexio.entrypoints=web"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  tunnel:
    container_name: tunnel
    restart: always
    image: cloudflare/cloudflared:2026.2.0
    command: tunnel --no-autoupdate --metrics 0.0.0.0:60123 run
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "0.0.0.0:60123", "ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.1
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CONTAINERS=1
      - EVENTS=1
      - NETWORKS=1
      - IMAGES=1
      - POST=1
      - PING=1
      - INFO=1
      - EXEC=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dockflare-internal

  dockflare-init:
    image: alpine:3.20
    container_name: dockflare-init
    command: ["sh", "-c", "chown -R 65532:65532 /app/data"]
    volumes:
      - ${FOLDER_FOR_DATA:?err}/dockflare:/app/data
    networks:
      - dockflare-internal
    restart: "no"

  dockflare-redis:
    image: redis:7-alpine
    container_name: dockflare-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - ${FOLDER_FOR_DATA:?err}/dockflare-redis:/data
    networks:
      - dockflare-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dockflare:
    image: alplat/dockflare:v3.0.6
    container_name: dockflare
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT_DOCKFLARE}:5000"
    volumes:
      - ${FOLDER_FOR_DATA:?err}/dockflare:/app/data
    environment:
      - TZ=Europe/Paris
      - REDIS_URL=redis://dockflare-redis:6379/0
      - REDIS_DB_INDEX=0
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - SCAN_ALL_NETWORKS=false
      - USE_EXTERNAL_CLOUDFLARED=false
      - EXTERNAL_TUNNEL_ID=${DOCKERFLARE_EXTERNAL_TUNNEL_ID}
      - TUNNEL_NAME=DockFlare-Tunnel
      - CLOUDFLARED_NETWORK_NAME=mediastack
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_API_TOKEN=${CF_API_TOKEN}
    depends_on:
      docker-socket-proxy:
        condition: service_started
      dockflare-init:
        condition: service_completed_successfully
      dockflare-redis:
        condition: service_healthy
    networks:
      - mediastack
      - dockflare-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockflare.rule=Host(`dockflare.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.dockflare.loadbalancer.server.port=${WEBUI_PORT_DOCKFLARE:?err}"
      - "traefik.http.routers.dockflare.entrypoints=web"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${FOLDER_FOR_DATA:?err}/dockfhand:/app/data
      - ./:/local_docker_compose
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockhand.rule=Host(`dockhand.${SERVER_HOSTNAME}`)"
      - "traefik.http.services.dockhand.loadbalancer.server.port=3000"
      - "traefik.http.routers.dockhand.entrypoints=web"
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s